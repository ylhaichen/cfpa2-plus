environment:
  map_width: 80
  map_height: 80
  map_type: rooms
  random_seed: 42
  obstacle_density: 0.03

robots:
  num_robots: 2
  start_positions:
    - [4, 4]
    - [6, 4]
  sensor_range: 6
  use_line_of_sight: true
  step_size: 1

frontier:
  neighborhood: 8
  cluster_method: bfs
  min_cluster_size: 1
  target_frontier_count_min: 3
  target_frontier_count_max: 8
  representative_min_distance: 10.0
  ig_radius: 6
  w_ig: 1.0
  w_c: 0.6
  w_sw: 0.2

allocator:
  lambda_overlap: 0.5
  mu_interference: 0.0
  sigma_overlap: null
  hysteresis_margin: 0.4
  reservation_ttl: 20

replanning:
  enable_event_replan: true
  periodic_replan_interval: 12
  stuck_threshold: 10
  frontier_change_threshold: 0.25
  invalidation_path_threshold: 4
  invalidation_distance_threshold: 2.0

termination:
  coverage_threshold: 0.95
  max_steps: 2000

visualization:
  enable_live_plot: true
  save_animation: false
  save_video: false
  video_format: mp4
  animation_fps: 10
  plot_every_n_steps: 2
  show_frontier_cells: false

outputs:
  base_dir: outputs
