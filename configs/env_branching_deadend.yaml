environment:
  map_name: branching_deadend
  map_family: branching_deadend
  map_type: branching_deadend
  map_width: 96
  map_height: 72
  random_seed: 42
  obstacle_density: 0.04

robots:
  start_positions:
    - [3, 3]
    - [5, 3]
  sensor_fov_deg: 300.0
  observation_miss_prob: 0.0

termination:
  coverage_threshold: 0.98
  max_steps: 6000
  step_dt: 1.0

